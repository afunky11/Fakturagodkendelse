<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fakturagodkendelse - BankInvest</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="header-left">
      <img src="logo.png" alt="BankInvest" class="logo">
      <div class="header-divider"></div>
      <div class="header-titles">
        <h1>Fakturagodkendelse</h1>
        <p class="subtitle">PoC – upload faktura og få den læst af AI</p>
      </div>
    </div>
  </header>

  <main class="narrow">
    <section class="upload-section">
      <div id="dropzone" class="dropzone">
        <div class="dropzone-content">
          <div class="upload-icon">📄</div>
          <p class="dropzone-text">Træk en faktura hertil</p>
          <p class="dropzone-or">eller</p>
          <div class="upload-buttons">
            <label for="file-input" class="btn btn-primary">
              Vælg fil
            </label>
            <input type="file" id="file-input" accept="application/pdf,image/*" hidden>
            
            <label for="camera-input" class="btn btn-secondary">
              📷 Tag billede
            </label>
            <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
          </div>
          <p class="dropzone-hint">PDF, JPG eller PNG · max 25 MB</p>
        </div>
      </div>

      <div id="upload-status" class="upload-status hidden">
        <div class="spinner"></div>
        <p id="status-text">Uploader fil...</p>
      </div>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>Fakturaer</h2>
        <button id="refresh-btn" class="btn btn-icon" title="Genindlæs">🔄</button>
      </div>
      <div id="faktura-list" class="faktura-list">
        <p class="loading">Indlæser...</p>
      </div>
    </section>
  </main>

  <footer>
    <p class="footer-text">PoC – ikke til produktion. Ingen login, åben adgang.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
