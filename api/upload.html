<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload faktura - BankInvest</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      --bi-darkblue: #042f4e;
      --bi-darkblue-hover: #0a4670;
      --bi-lightblue: #4dbcc6;
      --bi-bg-page: #f4fafe;
      --bi-bg-section: #E3F3FD;
      --bi-success: #63866C;
      --bi-success-bg: #d4e2cb;
      --bi-error: #cc7977;
      --bi-error-bg: #f5d4d3;
      --bi-text: #042f4e;
      --bi-text-muted: #5a7a92;
      --bi-text-faded: #94a3b8;
      --bi-border: #d1e4f0;
    }
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bi-bg-page);
      color: var(--bi-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .kort {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--bi-border);
      box-shadow: 0 4px 16px rgba(4, 47, 78, 0.08);
      text-align: center;
    }
    
    .logo {
      height: 28px;
      width: auto;
      margin-bottom: 20px;
    }
    
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--bi-darkblue);
      margin-bottom: 8px;
    }
    
    .undertekst {
      font-size: 14px;
      color: var(--bi-text-muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    
    .upload-zone {
      border: 2px dashed var(--bi-border);
      border-radius: 12px;
      padding: 36px 20px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    
    .upload-zone:hover, .upload-zone:active {
      background: var(--bi-bg-section);
      border-color: var(--bi-lightblue);
    }
    
    .upload-zone.har-fil {
      border-color: var(--bi-lightblue);
      background: var(--bi-bg-section);
      display: none;
    }
    
    .upload-ikon { font-size: 44px; margin-bottom: 10px; }
    .upload-tekst {
      font-size: 15px;
      font-weight: 600;
      color: var(--bi-darkblue);
      margin-bottom: 4px;
    }
    .upload-sub {
      font-size: 13px;
      color: var(--bi-text-faded);
    }

    #fil-input { display: none; }

    .preview {
      width: 100%;
      max-height: 300px;
      object-fit: contain;
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
      border: 1px solid var(--bi-border);
      background: var(--bi-bg-page);
    }
    
    .pdf-preview {
      padding: 32px;
      background: var(--bi-bg-section);
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
    }
    
    .pdf-ikon { font-size: 48px; margin-bottom: 8px; }
    .pdf-navn {
      font-size: 14px;
      color: var(--bi-darkblue);
      font-weight: 500;
      word-break: break-all;
    }

    .knap {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    
    .knap-primary {
      background: var(--bi-darkblue);
      color: white;
      display: none;
      margin-bottom: 10px;
    }
    .knap-primary:hover:not(:disabled) { background: var(--bi-darkblue-hover); }
    .knap-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .knap-secondary {
      background: white;
      color: var(--bi-darkblue);
      border: 1.5px solid var(--bi-border);
      display: none;
    }
    .knap-secondary:hover { background: var(--bi-bg-section); }

    .status {
      font-size: 14px;
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      display: none;
      text-align: left;
    }
    .status.success { background: var(--bi-success-bg); color: var(--bi-success); display: block; }
    .status.error { background: var(--bi-error-bg); color: var(--bi-error); display: block; }
    .status.loading { background: var(--bi-bg-section); color: var(--bi-darkblue); display: block; }
    
    .footer-note {
      margin-top: 20px;
      font-size: 12px;
      color: var(--bi-text-faded);
    }
  </style>
</head>
<body>
  <div class="kort">
    <img src="logo.png" alt="BankInvest" class="logo">
    <h1>Upload faktura</h1>
    <p class="undertekst">Tag et billede af fakturaen eller vælg en fil. Den sendes direkte til din PC.</p>

    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('fil-input').click()">
      <div class="upload-ikon">📷</div>
      <div class="upload-tekst">Tryk for at vælge fil</div>
      <div class="upload-sub">Tag billede eller vælg PDF</div>
    </div>

    <input type="file" id="fil-input" accept="application/pdf,image/*" capture="environment" onchange="vælgFil(this)">
    
    <img id="preview" class="preview">
    <div id="pdf-preview" class="pdf-preview">
      <div class="pdf-ikon">📄</div>
      <div class="pdf-navn" id="pdf-navn"></div>
    </div>

    <button class="knap knap-primary" id="upload-knap" onclick="uploadFil()">Send til PC →</button>
    <button class="knap knap-secondary" id="skift-knap" onclick="document.getElementById('fil-input').click()">Vælg en anden fil</button>

    <div class="status" id="status"></div>
    
    <p class="footer-note">PoC – ingen login nødvendig</p>
  </div>

  <script>
    const sb = window.supabase.createClient(
      "https://rljwhngtzhefrtvmfpyh.supabase.co",
      "sb_publishable_Up9cevlFCt4gY2f7-TDdsg_eG1cgWHC"
    );

    const params = new URLSearchParams(window.location.search);
    const sessionToken = params.get("session");

    if (!sessionToken) {
      document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#cc7977;font-family:Work Sans,sans-serif">Ugyldig upload-link. Gå tilbage til PC og scan QR-koden igen.</div>';
    }

    let valgtFil = null;

    function vælgFil(input) {
      if (!input.files?.[0]) return;
      valgtFil = input.files[0];
      
      const erPdf = valgtFil.type === 'application/pdf';
      const preview = document.getElementById("preview");
      const pdfPreview = document.getElementById("pdf-preview");
      const pdfNavn = document.getElementById("pdf-navn");
      
      if (erPdf) {
        preview.style.display = "none";
        pdfPreview.style.display = "block";
        pdfNavn.textContent = valgtFil.name;
      } else {
        preview.src = URL.createObjectURL(valgtFil);
        preview.style.display = "block";
        pdfPreview.style.display = "none";
      }

      document.getElementById("upload-zone").style.display = "none";
      document.getElementById("upload-knap").style.display = "block";
      document.getElementById("skift-knap").style.display = "block";
      document.getElementById("status").className = "status";
      document.getElementById("status").style.display = "none";
    }

    async function uploadFil() {
      if (!valgtFil || !sessionToken) return;

      const knap = document.getElementById("upload-knap");
      knap.disabled = true;
      knap.textContent = "Sender...";

      const status = document.getElementById("status");
      status.className = "status loading";
      status.textContent = "Uploader fil...";

      try {
        // Bevar filendelsen så PC'en ved hvilken type det er
        const ext = valgtFil.name.split('.').pop().toLowerCase();
        const filnavn = `${sessionToken}.${ext}`;
        
        const { error } = await sb.storage
          .from("faktura-bridge")
          .upload(filnavn, valgtFil, { 
            upsert: true, 
            contentType: valgtFil.type 
          });

        if (error) throw error;

        status.className = "status success";
        status.innerHTML = "✓ Sendt til PC!<br><small>Du kan nu fortsætte på din computer.</small>";
        knap.style.display = "none";
        document.getElementById("skift-knap").style.display = "none";

      } catch (err) {
        status.className = "status error";
        status.textContent = "Fejl: " + err.message;
        knap.disabled = false;
        knap.textContent = "Prøv igen";
      }
    }
  </script>
</body>
</html>
